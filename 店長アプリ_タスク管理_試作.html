<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>店長アプリ（試作）</title>
<style>
  :root{
    --navy:#4338ca; --navy-d:#3730a3;
    --teal:#0ea5e9; --gold:#f59e0b;
    --bg:#eef2ff; --card:#ffffff;
    --ink:#2b2e4a; --muted:#8b90b5; --line:#ebecf8;
    --red:#f43f5e; --red-bg:#fff1f3;
    --yellow:#f59e0b; --yellow-bg:#fff8eb;
    --green:#10b981; --green-bg:#e7fbf2;
    --grad:linear-gradient(135deg,#6d5efc 0%,#8b5cf6 45%,#22d3ee 100%);
    --grad-soft:linear-gradient(135deg,#a78bfa,#38bdf8);
    --appw:430px;          /* スマホ幅。これより広い画面では中央に寄せる */
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
    background:linear-gradient(180deg,#f3f0ff 0%,#eaf4ff 100%);background-attachment:fixed;
    color:var(--ink);font-size:16px;line-height:1.5;padding-bottom:96px;
  }
  /* ===== ヘッダー ===== */
  header{background:var(--grad);color:#fff;padding:14px 14px 12px;position:sticky;top:0;z-index:20;
         box-shadow:0 6px 18px rgba(109,94,252,.30);overflow:hidden;}
  .hdr-photo{position:absolute;inset:0;z-index:0;background-size:cover;background-position:center;
    opacity:.30;pointer-events:none;
    -webkit-mask-image:linear-gradient(to top,#000 0,#000 18%,transparent 95%);
            mask-image:linear-gradient(to top,#000 0,#000 18%,transparent 95%);}
  .hdr-photo svg{width:100%;height:100%;display:block;}
  .hdr-bg{position:absolute;inset:0;z-index:1;opacity:.16;pointer-events:none;
    -webkit-mask-image:linear-gradient(to top,#000 0,#000 22%,transparent 92%);
            mask-image:linear-gradient(to top,#000 0,#000 22%,transparent 92%);}
  .hdr-bg svg{width:100%;height:100%;display:block;}
  header .wrap{position:relative;z-index:2;max-width:var(--appw);margin:0 auto;}
  .hdr-main{display:flex;align-items:center;gap:12px;}
  .hdr-textcol{flex:1;min-width:0;}
  .h-title{font-size:15px;font-weight:800;letter-spacing:.01em;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .h-title small{display:block;font-size:10px;font-weight:400;color:#e7e0ff;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .hdr-logo{flex:0 0 auto;display:flex;align-items:center;justify-content:center;}
  .hdr-logo svg{width:100%;height:100%;display:block;}
  .hdr-logo img.fixed-mark{width:100%;height:100%;object-fit:contain;display:block;}
  .markprev svg{height:56px;width:auto;display:block;margin:0 auto;}
  .hdr-mark{flex:0 0 auto;display:flex;align-items:center;justify-content:center;cursor:pointer;
    background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 3px 12px rgba(0,0,0,.18);}
  .hdr-mark img{width:100%;height:100%;object-fit:contain;display:block;background:#fff;}
  .hdr-mark .ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;text-align:center;
    color:#aab;font-size:11px;font-weight:700;}
  .view-picker{margin-top:10px;display:inline-flex;align-items:center;gap:8px;border:none;border-radius:10px;
    background:rgba(255,255,255,.92);color:var(--navy);font-size:15px;font-weight:800;padding:9px 14px;box-shadow:0 2px 8px rgba(0,0,0,.12);max-width:100%;}
  .view-picker::after{content:"▼";font-size:10px;opacity:.6;}
  .view-picker span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .store-item{display:flex;align-items:center;justify-content:space-between;width:100%;text-align:left;border:1.5px solid var(--line);
    background:#fff;border-radius:12px;padding:13px 14px;font-size:15px;font-weight:700;color:var(--ink);margin-bottom:8px;}
  .store-item.on{border-color:transparent;background:var(--grad);color:#fff;}
  .store-item .badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:#eef0fb;color:#5a6878;}
  .store-item.on .badge{background:rgba(255,255,255,.25);color:#fff;}
  /* ===== 中身 ===== */
  main{padding:16px 14px 0;max-width:var(--appw);margin:0 auto;}
  .card{background:var(--card);border-radius:20px;padding:16px;margin-bottom:14px;
        box-shadow:0 8px 24px rgba(80,70,200,.08);border:1px solid var(--line);}
  .sec-h{font-size:13px;font-weight:800;color:var(--navy);margin:18px 4px 8px;display:flex;align-items:center;gap:6px;}
  .sec-h .dot{width:8px;height:8px;border-radius:50%;background:var(--grad);}
  .muted{color:var(--muted);}
  .empty{text-align:center;color:var(--muted);padding:26px 10px;font-size:14px;}
  /* ===== ホーム ===== */
  .hello{font-size:18px;font-weight:800;color:var(--navy);}
  .hello small{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-top:2px;}
  .notice{display:flex;gap:10px;padding:11px 4px;border-top:1px solid var(--line);font-size:14px;}
  .notice:first-child{border-top:none;}
  .notice .nd{flex:0 0 auto;font-size:11px;color:var(--muted);font-weight:700;min-width:42px;}
  .big-btns{display:grid;grid-template-columns:1fr;gap:12px;margin-top:6px;}
  .big-btn{display:flex;align-items:center;gap:14px;border:none;border-radius:18px;padding:18px 18px;
    background:var(--card);box-shadow:0 8px 24px rgba(80,70,200,.10);border:1px solid var(--line);text-align:left;}
  .big-btn .ic{flex:0 0 auto;width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;
    font-size:24px;background:var(--grad);color:#fff;box-shadow:0 4px 12px rgba(109,94,252,.30);}
  .big-btn .ic svg{width:27px;height:27px;display:block;}
  .big-btn > span{display:flex;flex-direction:column;min-width:0;}
  .big-btn .bt{display:block;font-size:17px;font-weight:800;color:var(--ink);}
  .big-btn .bs{display:block;font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4;}
  .big-btn .ar{margin-left:auto;color:var(--muted);font-size:20px;}
  /* ===== 達成度バー ===== */
  .ach-top{display:flex;align-items:baseline;justify-content:space-between;}
  .ach-label{font-size:13px;color:var(--muted);font-weight:700;}
  .ach-count{font-size:15px;color:var(--ink);font-weight:700;}
  .ach-pct{font-size:48px;font-weight:800;line-height:1;margin:6px 0 4px;
    background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .ach-pct span{font-size:20px;}
  .bar{height:16px;background:#eef0fb;border-radius:10px;overflow:hidden;margin-top:6px;}
  .bar > i{display:block;height:100%;background:var(--grad);border-radius:10px;transition:width .4s;
    box-shadow:0 2px 8px rgba(109,94,252,.35);}
  /* ===== タスク行 ===== */
  .grp-title{font-size:12px;font-weight:800;color:var(--teal);margin:14px 4px 6px;}
  .task{display:flex;align-items:flex-start;gap:12px;padding:12px 4px;border-top:1px solid var(--line);}
  .task:first-child{border-top:none;}
  .check{flex:0 0 auto;width:30px;height:30px;border-radius:50%;border:2px solid #cfd6dd;background:#fff;
    font-size:16px;color:transparent;display:flex;align-items:center;justify-content:center;}
  .check.done{background:linear-gradient(135deg,#10b981,#22d3ee);border-color:transparent;color:#fff;box-shadow:0 2px 8px rgba(16,185,129,.35);}
  .t-body{flex:1;min-width:0;}
  .t-name{font-size:15px;font-weight:700;}
  .task.done .t-name{color:var(--muted);}
  .t-meta{font-size:12px;color:var(--muted);margin-top:2px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
  .pill{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:#eef1f4;color:#5a6878;}
  .pill.due-over{background:var(--red-bg);color:var(--red);}
  .pill.due-soon{background:var(--yellow-bg);color:var(--yellow);}
  .pill.due-ok{background:var(--green-bg);color:var(--green);}
  .pill.done-tag{background:var(--green-bg);color:var(--green);}
  .pill.scope-all{background:#ede9fe;color:#7c3aed;}
  .pill.scope-single{background:#e0f2fe;color:#0284c7;}
  .pill.st-draft{background:#eef1f4;color:#5a6878;}
  .pill.st-pending{background:var(--yellow-bg);color:var(--yellow);}
  .pill.st-scheduled{background:#ede9fe;color:#7c3aed;}
  .pill.st-posted{background:var(--green-bg);color:var(--green);}
  .pill.st-rejected{background:var(--red-bg);color:var(--red);}
  .t-edit{flex:0 0 auto;color:var(--muted);font-size:20px;padding:2px 6px;background:none;border:none;}
  /* ===== 本部ダッシュ ===== */
  .store-row{display:flex;align-items:center;gap:12px;padding:14px 4px;border-top:1px solid var(--line);}
  .store-row:first-child{border-top:none;}
  .sr-name{flex:0 0 64px;font-weight:800;font-size:15px;}
  .sr-bar{flex:1;} .sr-bar .bar{height:14px;}
  .sr-pct{flex:0 0 54px;text-align:right;font-weight:800;font-size:17px;}
  .rank-tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;}
  .rank-top{background:var(--green-bg);color:var(--green);}
  .rank-low{background:var(--red-bg);color:var(--red);}
  .lead{font-size:13px;color:var(--muted);margin:2px 4px 14px;}
  /* ===== ボタン ===== */
  .btn-grad{display:block;width:100%;background:var(--grad);color:#fff;border:none;border-radius:14px;
    padding:15px;font-size:16px;font-weight:800;box-shadow:0 6px 16px rgba(109,94,252,.35);margin-top:4px;}
  .btn-line{display:block;width:100%;background:#fff;color:var(--navy);border:1.5px solid var(--line);
    border-radius:14px;padding:13px;font-size:15px;font-weight:700;margin-top:10px;}
  .btn-del{width:100%;margin-top:14px;background:#fff;color:var(--red);border:1.5px solid var(--red-bg);
    border-radius:12px;padding:13px;font-size:14px;font-weight:700;}
  /* ===== インスタ ===== */
  .script-card{background:var(--grad);color:#fff;border-radius:20px;padding:18px;margin-bottom:14px;
    box-shadow:0 10px 26px rgba(109,94,252,.35);}
  .script-card .lab{font-size:12px;font-weight:700;opacity:.9;display:flex;align-items:center;gap:6px;}
  .script-card h3{font-size:20px;margin:8px 0 10px;font-weight:800;}
  .script-card ul{margin:0;padding-left:18px;font-size:14px;line-height:1.8;}
  .script-card .thumb-idea{margin-top:12px;background:rgba(255,255,255,.18);border-radius:12px;padding:10px 12px;font-size:13px;font-weight:700;}
  .ai-btn{background:rgba(255,255,255,.22);color:#fff;border:1px solid rgba(255,255,255,.45);
    border-radius:20px;padding:8px 14px;font-size:13px;font-weight:700;margin-top:14px;}
  .vidbox{border:2px dashed var(--line);border-radius:14px;padding:24px;text-align:center;color:var(--muted);font-size:14px;background:#fafaff;}
  .vidbox.has{border-style:solid;border-color:#c4b5fd;color:var(--navy);background:#f5f3ff;font-weight:700;}
  .post-thumb{display:flex;gap:12px;align-items:center;}
  .post-thumb .ph{flex:0 0 auto;width:56px;height:56px;border-radius:12px;background:var(--grad);
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;}
  .toggle{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 4px;border-top:1px solid var(--line);}
  .sw{position:relative;width:50px;height:28px;border-radius:20px;background:#d7dbef;border:none;flex:0 0 auto;transition:.2s;}
  .sw.on{background:linear-gradient(135deg,#8b5cf6,#22d3ee);}
  .sw i{position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
  .sw.on i{left:25px;}
  /* ===== アンケート ===== */
  .q-block{padding:14px 0;border-top:1px solid var(--line);}
  .q-block:first-child{border-top:none;}
  .q-text{font-size:14px;font-weight:600;margin-bottom:8px;}
  .q-opts{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
  .q-opts button{padding:10px 6px;border:1.5px solid var(--line);border-radius:10px;background:#fafaff;
    font-size:12.5px;font-weight:700;color:#5a6878;line-height:1.3;}
  .q-opts button.on{background:var(--grad);color:#fff;border-color:transparent;}
  .sub-score{display:flex;align-items:center;gap:10px;padding:10px 4px;border-top:1px solid var(--line);}
  .sub-score:first-child{border-top:none;}
  .ss-name{flex:1;font-size:13.5px;font-weight:700;}
  .ss-bar{flex:0 0 110px;} .ss-bar .bar{height:12px;}
  .ss-pct{flex:0 0 64px;text-align:right;font-weight:800;font-size:15px;}
  .ss-pct.hi{color:var(--green);} .ss-pct.lo{color:var(--red);}
  .grandcard{text-align:center;}
  .grandcard .gp{font-size:52px;font-weight:800;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1;}
  .ai-summary{background:#f5f3ff;border:1px solid #e4ddff;border-radius:14px;padding:14px;font-size:14px;line-height:1.7;}
  .ai-summary .lab{font-size:12px;font-weight:800;color:#7c3aed;display:flex;align-items:center;gap:6px;margin-bottom:6px;}
  .freetext{font-size:13px;color:var(--ink);padding:9px 0;border-top:1px dashed var(--line);}
  .freetext:first-child{border-top:none;}
  table.attr{width:100%;border-collapse:collapse;font-size:13px;}
  table.attr th,table.attr td{padding:8px 6px;text-align:center;border-bottom:1px solid var(--line);}
  table.attr th{color:var(--muted);font-weight:700;font-size:12px;}
  table.attr td.name{text-align:left;font-weight:700;}
  .cell-hi{color:var(--green);font-weight:800;} .cell-lo{color:var(--red);font-weight:800;}
  .rt-good{background:#e7f0ff!important;color:#2563eb;font-weight:800;}
  .rt-bad{background:#fff1f3!important;color:#f43f5e;font-weight:800;}
  /* ===== モーダル ===== */
  .modal-bg{position:fixed;inset:0;background:rgba(45,46,74,.5);z-index:40;display:none;align-items:flex-end;}
  .modal-bg.on{display:flex;}
  .modal{background:#fff;width:100%;max-width:560px;margin:0 auto;border-radius:22px 22px 0 0;
    padding:18px 16px 26px;max-height:94vh;overflow:auto;animation:up .25s ease;}
  @keyframes up{from{transform:translateY(40px);opacity:.5;}to{transform:none;opacity:1;}}
  .modal h2{font-size:18px;margin:2px 0 10px;color:var(--navy);}
  label.fld{display:block;font-size:13px;font-weight:700;color:var(--ink);margin:14px 2px 6px;}
  input[type=text],input[type=datetime-local],select,input[type=date],textarea{
    width:100%;padding:13px 12px;border:1.5px solid var(--line);border-radius:12px;font-size:16px;background:#fafaf7;color:var(--ink);}
  textarea{min-height:80px;resize:vertical;font-family:inherit;}
  .seg{display:flex;flex-wrap:wrap;gap:8px;}
  .seg button{flex:1 1 auto;min-width:78px;padding:11px 6px;border:1.5px solid var(--line);border-radius:12px;background:#fafaf7;font-size:14px;font-weight:700;color:#5a6878;}
  .seg button.on{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(109,94,252,.30);}
  .sub{margin-top:12px;}
  .m-actions{display:flex;gap:10px;margin-top:22px;}
  .btn-main{flex:1;background:var(--grad);color:#fff;border:none;border-radius:12px;padding:15px;font-size:16px;font-weight:800;box-shadow:0 6px 16px rgba(109,94,252,.35);}
  .btn-ghost{flex:0 0 auto;background:#fff;color:var(--muted);border:1.5px solid var(--line);border-radius:12px;padding:15px 18px;font-size:15px;font-weight:700;}
  .hint{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.5;}
  .scope-note{font-size:13px;font-weight:700;color:var(--navy);background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin:14px 0 0;}
  .foot-note{font-size:11px;color:var(--muted);text-align:center;padding:6px 20px 10px;line-height:1.6;}
  /* ===== 下のメニュー ===== */
  nav.bottom{position:fixed;left:0;right:0;bottom:0;z-index:30;background:#fff;display:flex;
    box-shadow:0 -2px 16px rgba(80,70,200,.12);border-top:1px solid var(--line);max-width:var(--appw);margin:0 auto;}
  nav.bottom button{flex:1;border:none;background:none;padding:9px 0 11px;color:var(--muted);font-size:11px;font-weight:700;}
  nav.bottom button .ni{display:block;font-size:21px;margin-bottom:1px;filter:grayscale(1);opacity:.55;}
  nav.bottom button.on{color:var(--navy);}
  nav.bottom button.on .ni{filter:none;opacity:1;}
  /* ===== 印刷／PDF用 ===== */
  .print-only{display:none;}
  @media print{
    .no-print{display:none!important;}
    header,nav.bottom{display:none!important;}
    body{background:#fff!important;padding:0!important;}
    main{max-width:100%!important;padding:0 6mm!important;}
    .card{box-shadow:none!important;border:1px solid #d9d9e3!important;break-inside:avoid;}
    .sec-h{break-after:avoid;}
    .print-only{display:block!important;}
    .print-head{display:flex!important;align-items:center;gap:12px;border-bottom:2px solid #6d5efc;padding-bottom:8px;margin:0 0 12px;}
    .print-head img{max-height:50px;max-width:160px;object-fit:contain;}
    *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
  }
</style>
</head>
<body>

<header>
  <div class="hdr-photo" id="hdrPhoto" aria-hidden="true"></div>
  <div class="hdr-bg" aria-hidden="true">
    <svg viewBox="0 0 430 120" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg"><g fill="#ffffff">
      <g transform="translate(44,8)"><path d="M-40,120 C-40,90 -24,78 0,78 C24,78 40,90 40,120 Z"/><circle cx="0" cy="60" r="17"/></g>
      <g transform="translate(112,3)"><path d="M-36,120 C-36,92 -22,80 0,80 C22,80 36,92 36,120 Z"/><path d="M-19,60 C-22,40 22,40 19,60 C20,74 16,96 11,108 L6,108 C10,96 12,80 11,62 L-11,62 C-12,80 -10,96 -6,108 L-11,108 C-16,96 -20,74 -19,60 Z"/><circle cx="0" cy="58" r="14"/></g>
      <g transform="translate(182,-5)"><path d="M-43,120 C-43,87 -26,74 0,74 C26,74 43,87 43,120 Z"/><circle cx="0" cy="55" r="19"/></g>
      <g transform="translate(252,1)"><path d="M-36,120 C-36,92 -22,80 0,80 C22,80 36,92 36,120 Z"/><path d="M-19,60 C-22,40 22,40 19,60 C20,74 16,96 11,108 L6,108 C10,96 12,80 11,62 L-11,62 C-12,80 -10,96 -6,108 L-11,108 C-16,96 -20,74 -19,60 Z"/><circle cx="0" cy="58" r="14"/></g>
      <g transform="translate(318,-3)"><path d="M-41,120 C-41,89 -25,76 0,76 C25,76 41,89 41,120 Z"/><circle cx="0" cy="57" r="18"/></g>
      <g transform="translate(386,8)"><path d="M-34,120 C-34,93 -21,81 0,81 C21,81 34,93 34,120 Z"/><path d="M-18,61 C-21,42 21,42 18,61 C19,74 15,95 10,106 L6,106 C9,95 11,80 10,63 L-10,63 C-11,80 -9,95 -6,106 L-10,106 C-15,95 -19,74 -18,61 Z"/><circle cx="0" cy="59" r="13"/></g>
    </g></svg>
  </div>
  <div class="wrap">
    <div class="hdr-main">
      <div class="hdr-mark" id="hdrMark" onclick="openSettings()"></div>
      <div class="hdr-textcol">
        <div class="h-title">シゴデキ店長アプリ <small id="hSub">タスク・インスタ・アンケート（試作）</small></div>
        <button class="view-picker" id="viewPicker" onclick="openStorePicker()"><span id="viewLabel">本部</span></button>
      </div>
      <div class="hdr-logo" id="hdrLogo" onclick="openSettings()"></div>
    </div>
  </div>
</header>

<main id="app"></main>

<input type="file" id="logoFile" accept="image/*,application/pdf" style="display:none" onchange="onLogoFile(event)">
<input type="file" id="photoFile" accept="image/*" style="display:none" onchange="onPhotoFile(event)">
<input type="file" id="markFile" accept="image/*" style="display:none" onchange="onMarkFile(event)">

<nav class="bottom" id="bottomNav">
  <button data-m="home"   onclick="go('home')"><span class="ni">🏠</span>ホーム</button>
  <button data-m="task"   onclick="go('task')"><span class="ni">✅</span>タスク</button>
  <button data-m="insta"  onclick="go('insta')"><span class="ni">🎬</span>インスタ</button>
  <button data-m="survey" onclick="go('survey')"><span class="ni">📝</span>アンケート</button>
  <button data-m="report" onclick="go('report')"><span class="ni">📈</span>レポート</button>
</nav>

function fmt(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function parse(s){const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);}
function todayStr(){return fmt(new Date());}
function daysBetween(a,b){return Math.round((parse(b)-parse(a))/86400000);}
function nextDateStr(n){const d=new Date();d.setDate(d.getDate()+n);return fmt(d);}
function esc(s){return(""+s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

/* =====================================================================
   タスク：くりかえし計算（前バージョンから踏襲）
   ===================================================================== */
function cycleKey(t,ref){const d=ref||new Date();switch(t.freq){
  case"daily":return"d"+fmt(d);case"weekly":return"w"+isoWeek(d);
  case"monthlyDay":case"monthlyNth":return"m"+d.getFullYear()+"-"+(d.getMonth()+1);case"once":return"once";}}
function isoWeek(d){const x=new Date(d);x.setHours(0,0,0,0);x.setDate(x.getDate()+3-((x.getDay()+6)%7));
  const w1=new Date(x.getFullYear(),0,4);return x.getFullYear()+"-W"+(1+Math.round(((x-w1)/86400000-3+((w1.getDay()+6)%7))/7));}
function isDone(t){return t.completions.includes(cycleKey(t));}
function toggleDone(t){const k=cycleKey(t),i=t.completions.indexOf(k);if(i>=0)t.completions.splice(i,1);else t.completions.push(k);save();}
function nextDue(t){const now=new Date();now.setHours(0,0,0,0);const done=isDone(t);switch(t.freq){
  case"daily":if(!done)return fmt(now);{const x=new Date(now);x.setDate(x.getDate()+1);return fmt(x);}
  case"weekly":{let c=upWeekday(now,t.weekday);if(done){c=new Date(c);c.setDate(c.getDate()+7);}return fmt(c);}
  case"monthlyDay":{let c=monthDay(now.getFullYear(),now.getMonth(),t.day);if(c<now||done)c=monthDay(now.getFullYear(),now.getMonth()+1,t.day);return fmt(c);}
  case"monthlyNth":{let c=nthWk(now.getFullYear(),now.getMonth(),t.nth,t.nthWeekday);if(c<now||done)c=nthWk(now.getFullYear(),now.getMonth()+1,t.nth,t.nthWeekday);return fmt(c);}
  case"once":return t.onceDate;}}
function upWeekday(f,wd){const d=new Date(f);d.setDate(d.getDate()+((wd-d.getDay()+7)%7));return d;}
function monthDay(y,m,day){const last=new Date(y,m+1,0).getDate();return new Date(y,m,Math.min(day,last));}
function nthWk(y,m,nth,wd){const first=new Date(y,m,1),off=(wd-first.getDay()+7)%7;let dt=1+off+(nth-1)*7;const last=new Date(y,m+1,0).getDate();if(dt>last)dt-=7;return new Date(y,m,dt);}
function dueState(t){if(isDone(t))return"done";const diff=daysBetween(todayStr(),nextDue(t));if(diff<0)return"over";if(diff<=3)return"soon";return"ok";}
const wdJa=["日","月","火","水","木","金","土"];
function freqText(t){switch(t.freq){case"daily":return"毎日";case"weekly":return"毎週"+wdJa[t.weekday]+"曜";
  case"monthlyDay":return"毎月"+t.day+"日";case"monthlyNth":return"毎月第"+t.nth+wdJa[t.nthWeekday]+"曜";case"once":return"単発";}}
function dueText(t){const due=nextDue(t),diff=daysBetween(todayStr(),due),[y,m,d]=due.split("-"),md=Number(m)+"/"+Number(d);
  if(isDone(t))return"完了ずみ";if(diff<0)return md+"（"+(-diff)+"日 過ぎています）";if(diff===0)return md+"（今日まで）";
  if(diff===1)return md+"（明日まで）";if(diff<=3)return md+"（あと"+diff+"日）";return md+"まで";}
function achievement(s){const a=DB.stores[s],total=a.length,done=a.filter(isDone).length;return{done,total,pct:total?Math.round(done/total*100):0};}

function renderStoreList(q){
  q=(q||"").trim();
  const items=[{label:"本部",kind:"hq",badge:"全店管理"}].concat(STORES.map(s=>({label:s,kind:"store",store:s,badge:"店舗"})));
  const list=items.filter(it=>!q||it.label.indexOf(q)>=0);
  const html=list.map(it=>{
    const on=it.kind==="hq"?role==="hq":(role==="manager"&&curStore===it.store);
    return `<button class="store-item ${on?'on':''}" onclick="selectView('${it.kind}','${it.store||''}')">
      <span>${esc(it.label)}</span><span class="badge">${on?'✓ 表示中':it.badge}</span></button>`;
  }).join("");
  document.getElementById("storeList").innerHTML = html || `<div class="empty">「${esc(q)}」に一致する店舗がありません</div>`;
}

  el.innerHTML = `<img src="header-mark.png" alt="企業ロゴ" class="fixed-mark" onerror="this.outerHTML=MARK_FALLBACK">`;

function updateHeaderMark(){
  const el=document.getElementById("hdrMark");if(!el)return;
  el.innerHTML = DB.headerMark ? `<img src="${DB.headerMark}" alt="店舗ロゴ">` : `<span class="ph">店舗<br>ロゴ</span>`;

}
// 左マーク・右ロゴをヘッダー高さの85%の正方形に（マークを外した状態で高さを測り、暴走を防ぐ）
function sizeHeaderImages(){
  const h=document.querySelector("header");if(!h)return;
  const mk=document.getElementById("hdrMark"),lg=document.getElementById("hdrLogo");
  const pm=mk?mk.style.display:"",pl=lg?lg.style.display:"";
  if(mk)mk.style.display="none";if(lg)lg.style.display="none";
  const base=h.offsetHeight;
  if(mk)mk.style.display=pm;if(lg)lg.style.display=pl;
  const s=Math.round(base*0.85);
  [mk,lg].forEach(b=>{if(b){b.style.width=s+"px";b.style.height=s+"px";}});
}

function onMarkFile(e){
  const f=e.target.files&&e.target.files[0];if(!f)return;
  if(f.type.indexOf("image/")!==0){alert("マークは画像（PNG・JPG）を選んでください。白・透過PNGがおすすめです。");e.target.value="";return;}
  const r=new FileReader();r.onload=()=>{DB.headerMark=r.result;save();render();refreshSettings();};r.readAsDataURL(f);
  e.target.value="";
}

function printHead(title){

    ${DB.logo?`<img src="${DB.logo}" alt="ロゴ">`:""}

}
function csvEsc(v){v=(v==null?"":""+v);return /[",\n\r]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}
function downloadCSV(name,rows){
  const csv="﻿"+rows.map(r=>r.map(csvEsc).join(",")).join("\r\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=name;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function downloadSurveyCSV(){
  const sv=activeSurvey();const rows=[];
  rows.push(["シゴデキ店長アプリ ES集計",sv.title]);
  rows.push(["集計日",todayStr(),"回答数",sv.responses.length]);rows.push([]);
  const totals=sv.responses.map(r=>r.total).filter(v=>v);
  rows.push(["総合満足度(%)",totals.length?Math.round(totals.filter(v=>v<=2).length/totals.length*100):0]);rows.push([]);
  rows.push(["小分類スコア（平均）"]);rows.push(["大分類","小分類","スコア(%)"]);
  subScores(sv).forEach(s=>rows.push([s.grp,s.name,s.score]));rows.push([]);
  rows.push(["設問別スコア"]);rows.push(["大分類","小分類","設問","スコア(%)"]);
  ["A","B"].forEach(g=>ES_TEMPLATE[g].subs.forEach(sub=>sub.qs.forEach((q,i)=>rows.push([ES_TEMPLATE[g].name,sub.name,q,qScore(sv,sub.key+"_"+i)]))));
  rows.push([]);
  rows.push(["所属（店舗）別 満足度","満足度(%)","回答数"]);
  sv.attr.depts.forEach(d=>{const rs=sv.responses.filter(r=>r.attrs.dept===d);rows.push([d,rs.length?overallScore(rs):"",rs.length]);});

  sv.attr.roles.forEach(d=>{const rs=sv.responses.filter(r=>r.attrs.role===d);rows.push([d,rs.length?overallScore(rs):"",rs.length]);});

function onLogoFile(e){
  const f=e.target.files&&e.target.files[0]; if(!f)return;
  if(f.type==="application/pdf"){ handleLogoPdf(f); }
  else if(f.type.indexOf("image/")===0){
    const r=new FileReader();
    r.onload=()=>{DB.logo=r.result;save();render();refreshSettings();};
    r.readAsDataURL(f);
  }else{ alert("JPG・PNG・PDF のいずれかのファイルを選んでください。"); }
  e.target.value="";
}
function removeLogo(){ if(!confirm("ロゴを削除しますか？"))return; DB.logo=null; save(); render(); refreshSettings(); }
// PDFは1ページ目を画像に変換して取り込む（部品をネットから読み込みます）
function handleLogoPdf(f){
  loadPdfLib().then(()=>{
    const r=new FileReader();
    r.onload=()=>{
      pdfjsLib.getDocument({data:r.result}).promise
        .then(pdf=>pdf.getPage(1))
        .then(page=>{
          const vp=page.getViewport({scale:2});
          const c=document.createElement("canvas");c.width=vp.width;c.height=vp.height;
          return page.render({canvasContext:c.getContext("2d"),viewport:vp}).promise
            .then(()=>{DB.logo=c.toDataURL("image/png");save();render();refreshSettings();});
        })
        .catch(()=>alert("PDFの読み込みに失敗しました。JPGかPNGの画像でお試しください。"));
    };
    r.readAsArrayBuffer(f);
  }).catch(()=>alert("PDFを画像に変換する部品を読み込めませんでした（この処理だけインターネット接続が必要です）。JPGかPNGの画像をお使いください。"));
}
function loadPdfLib(){
  return new Promise((res,rej)=>{
    if(window.pdfjsLib)return res();
    const s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    s.onload=()=>{try{pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";}catch(e){} res();};
    s.onerror=rej;
    document.head.appendChild(s);
  });
}

function renderTask(){ return role==="hq"?renderTaskHQ():renderTaskManager(); }
function renderTaskManager(){
  const a=achievement(curStore),arr=DB.stores[curStore];
  const remind=arr.filter(t=>{const s=dueState(t);return s==="over"||s==="soon";}).sort((x,y)=>daysBetween(todayStr(),nextDue(x))-daysBetween(todayStr(),nextDue(y)));
  const cats=[...new Set(arr.map(t=>t.cat))];
  let html=`<div class="card"><div class="ach-top"><span class="ach-label">${curStore}の達成度（今の周期）</span><span class="ach-count">${a.done} / ${a.total} 完了</span></div>
    <div class="ach-pct">${a.pct}<span>%</span></div><div class="bar"><i style="width:${a.pct}%"></i></div></div>`;
  html+=`<div class="sec-h"><span class="dot"></span>リマインド（期限が近い・過ぎたタスク）</div>`;
  html+= remind.length? `<div class="card">`+remind.map(taskRow).join("")+`</div>` : `<div class="card"><div class="empty">期限が迫ったタスクはありません。順調です 👍</div></div>`;
  html+=`<div class="sec-h"><span class="dot"></span>すべてのタスク（分野ごと）</div><div class="card">`;
  cats.forEach(c=>{html+=`<div class="grp-title">▪ ${c}</div>`+arr.filter(t=>t.cat===c).map(taskRow).join("");});
  html+=`</div>`;
  html+=`<button class="btn-grad" onclick="openTaskForm()">＋ タスクを追加</button>`;
  return html;
}
function taskRow(t){
  const done=isDone(t),st=dueState(t);let pc="due-ok",pill=dueText(t);
  if(done){pc="done-tag";pill="✓ 完了ずみ";}else if(st==="over")pc="due-over";else if(st==="soon")pc="due-soon";
  return `<div class="task ${done?'done':''}"><button class="check ${done?'done':''}" onclick="onCheck('${t.id}')">✓</button>
    <div class="t-body"><div class="t-name">${esc(t.name)}</div><div class="t-meta">
      <span class="pill">${freqText(t)}</span><span class="pill ${pc}">${pill}</span>
      ${t.scope==="all"?'<span class="pill scope-all">全店共通</span>':''}</div></div>
    ${t.scope==="single"?`<button class="t-edit" onclick="openTaskForm('${t.id}','${curStore}')">✎</button>`:''}</div>`;
}

  let html=printHead("3店舗 タスク達成度");
  html+=`<div class="card"><div class="ach-top"><span class="ach-label">本部ダッシュボード｜3店舗の達成度くらべ</span></div>
    <p class="lead" style="margin:6px 0 4px">どの店が進んでいて、どこが遅れているか一目で分かります。</p>`;
  data.forEach(d=>{let tag="";if(d.pct===max&&d.pct!==min)tag=`<span class="rank-tag rank-top">トップ</span>`;else if(d.pct===min&&d.pct!==max)tag=`<span class="rank-tag rank-low">要フォロー</span>`;

      <div class="t-meta" style="margin-top:4px">${d.done}/${d.total} 完了 ${tag}</div></div><div class="sr-pct">${d.pct}%</div></div>`;});
  html+=`</div>`;
  html+=`<div class="card"><div class="ach-label" style="margin-bottom:6px">ひとこと講評</div>
    <p style="margin:0;font-size:14px;">いま一番進んでいるのは <b>${top.join("・")}</b>、いちばん手当てが必要なのは <b>${low.join("・")}</b> です。${low.join("・")}の店長に「何か詰まっていないか」声をかけてみましょう。</p></div>`;
  html+=`<div class="no-print"><button class="btn-grad" style="margin:0" onclick="window.print()">📄 PDFで保存・印刷する</button>

let tEditId=null,tEditStore=null,freqType="daily",scopeType="all";
function fillMonthDays(){const s=document.getElementById("fMonthDay");if(s.options.length)return;for(let i=1;i<=31;i++){const o=document.createElement("option");o.value=i;o.textContent=i+"日";s.appendChild(o);}}
function setFreq(f){freqType=f;document.querySelectorAll("#freqSeg button").forEach(b=>b.className=b.dataset.f===f?"on":"");
  document.getElementById("subWeekly").style.display=f==="weekly"?"block":"none";
  document.getElementById("subMonthlyDay").style.display=f==="monthlyDay"?"block":"none";
  document.getElementById("subMonthlyNth").style.display=f==="monthlyNth"?"block":"none";
  document.getElementById("subOnce").style.display=f==="once"?"block":"none";
  const h={daily:"毎日くりかえすタスクです。",weekly:"指定した曜日に毎週くりかえします。",monthlyDay:"毎月の決まった日にくりかえします。",monthlyNth:"毎月の「第N週の◯曜日」にくりかえします。",once:"1回だけのタスクです。"};
  document.getElementById("freqHint").textContent=h[f];}
function setScope(s){scopeType=s;document.querySelectorAll("#scopeSeg button").forEach(b=>b.className=b.dataset.s===s?"on":"");document.getElementById("storeChecks").style.display=s==="single"?"flex":"none";}
function openTaskForm(id,store){
  fillMonthDays();tEditId=id||null;tEditStore=store||curStore;
  const box=document.getElementById("scopeBox"),note=document.getElementById("scopeNote");
  document.getElementById("tmTitle").textContent=id?"タスクを編集":(role==="hq"?"タスクを配る":"タスクを追加");
  document.getElementById("tmDel").style.display=id?"block":"none";
  if(id){const t=DB.stores[tEditStore].find(x=>x.id===id);
    document.getElementById("fCategory").value=t.cat;document.getElementById("fName").value=t.name;setFreq(t.freq);
    if(t.freq==="weekly")document.getElementById("fWeekday").value=t.weekday;
    if(t.freq==="monthlyDay")document.getElementById("fMonthDay").value=t.day;
    if(t.freq==="monthlyNth"){document.getElementById("fNth").value=t.nth;document.getElementById("fNthWeekday").value=t.nthWeekday;}
    if(t.freq==="once")document.getElementById("fOnceDate").value=t.onceDate;
    box.style.display="none";note.style.display="block";
    note.textContent=t.scope==="all"?"このタスクは【全店共通】です。変更・削除すると3店舗すべてに反映されます。":"このタスクは【"+tEditStore+"】だけのタスクです。";
  }else{document.getElementById("fCategory").value="衛生";document.getElementById("fName").value="";setFreq("daily");
    document.getElementById("fOnceDate").value=todayStr();note.style.display="none";
    if(role==="hq"){box.style.display="block";setScope("all");}else{box.style.display="none";scopeType="single";}}
  openModal("taskModal");
}
function collectFields(){return{cat:document.getElementById("fCategory").value,name:document.getElementById("fName").value.trim(),freq:freqType,
  weekday:Number(document.getElementById("fWeekday").value),day:Number(document.getElementById("fMonthDay").value),
  nth:Number(document.getElementById("fNth").value),nthWeekday:Number(document.getElementById("fNthWeekday").value),onceDate:document.getElementById("fOnceDate").value};}
function saveTask(){
  const f=collectFields();if(!f.name){alert("タスク名を入れてください");return;}
  if(tEditId){const t=DB.stores[tEditStore].find(x=>x.id===tEditId);
    if(t.scope==="all")STORES.forEach(s=>DB.stores[s].forEach(x=>{if(x.groupId===t.groupId)Object.assign(x,f);}));else Object.assign(t,f);
  }else if(role==="hq"&&scopeType==="all"){const gid="g"+Date.now();STORES.forEach(s=>DB.stores[s].push({id:s+"_"+gid,groupId:gid,scope:"all",...f,completions:[]}));
  }else if(role==="hq"&&scopeType==="single"){const tg=[...document.querySelectorAll("#storeChecks button.on")].map(b=>b.dataset.store);
    if(!tg.length){alert("配る店舗を選んでください");return;}tg.forEach(s=>{const gid="g"+Date.now()+s;DB.stores[s].push({id:gid,groupId:gid,scope:"single",...f,completions:[]});});
  }else{const gid="g"+Date.now();DB.stores[curStore].push({id:gid,groupId:gid,scope:"single",...f,completions:[]});}
  save();closeModal("taskModal");render();
}
function deleteTask(){const t=DB.stores[tEditStore].find(x=>x.id===tEditId);
  if(t.scope==="all"){if(!confirm("【全店共通】のタスクです。3店舗すべてから削除します。よろしいですか？"))return;STORES.forEach(s=>{DB.stores[s]=DB.stores[s].filter(x=>x.groupId!==t.groupId);});}
  else{if(!confirm("このタスクを削除します。よろしいですか？"))return;DB.stores[tEditStore]=DB.stores[tEditStore].filter(x=>x.id!==tEditId);}
  save();closeModal("taskModal");render();}

const stStatus={draft:"下書き",pending:"本部の承認待ち",scheduled:"予約済み",posted:"投稿済み",rejected:"差し戻し"};

function postRow(p,showActions){

function renderInstaHQ(){
  let html=`<div class="sec-h"><span class="dot"></span>承認待ちの投稿</div><div class="card">`;
  const pend=[];STORES.forEach(s=>DB.posts[s].forEach(p=>{if(p.status==="pending")pend.push(p);}));
  html+= pend.length? pend.map(p=>`<div class="grp-title">▪ ${p.store}</div>`+postRow(p,true)).join("") : `<div class="empty">承認待ちの投稿はありません</div>`;
  html+=`</div>`;
  html+=`<div class="sec-h"><span class="dot"></span>店舗ごとの承認設定</div><div class="card">`;

    html+=`<div class="toggle"><div><div class="t-name">${s}</div><div class="t-meta">${on?"投稿前に本部がチェック":"店舗がそのまま公開"}</div></div>

function nextScript(){DB.settings[curStore].lastScript=(DB.settings[curStore].lastScript+1)%SCRIPTS.length;save();render();}
function toggleApproval(s){DB.settings[s].approval=!DB.settings[s].approval;save();render();}
function approvePost(store,id,ok){const p=DB.posts[store].find(x=>x.id===id);
  if(ok){p.status="scheduled";p.when=p.when&&p.when.indexOf("予約")>=0?p.when:"予約済み";}else{p.status="rejected";p.when="本部から差し戻し";}
  save();render();}

/* ----- 投稿作成フロー（モーダル） ----- */
let flowStep,flowScriptIdx,flowHasVideo,flowCaption,flowThumb,flowWhen,flowSchedAt;
function openPostFlow(idx){flowScriptIdx=idx;flowStep=1;flowHasVideo=false;flowCaption="";flowThumb=SCRIPTS[idx].thumb;flowWhen="即時";flowSchedAt="";renderFlow();openModal("genModal");}
function renderFlow(){
  const s=SCRIPTS[flowScriptIdx];let h=`<h2>投稿を作る（${flowStep}/4）</h2>`;
  if(flowStep===1){
    h+=`<div class="script-card" style="box-shadow:none;margin-bottom:12px"><div class="lab">台本</div><h3>${esc(s.title)}</h3><ul>${s.points.map(p=>`<li>${esc(p)}</li>`).join("")}</ul></div>`;
    h+=`<label class="fld">① この台本でショート動画を撮ってください</label>`;
    h+=`<div class="vidbox ${flowHasVideo?'has':''}" onclick="pickVideo()">${flowHasVideo?"✅ 動画を選びました（〇〇.mp4）":"📹 タップして撮影した動画を選ぶ"}</div>`;
    h+=`<p class="hint">※試作のため、実際の動画は読み込みません。「選んだ」状態だけ進みます。</p>`;
    h+=flowBtns(flowHasVideo);
  }else if(flowStep===2){
    h+=`<label class="fld">② AIが投稿文とサムネ文を作ります</label>`;
    if(!flowCaption){h+=`<button class="btn-grad" onclick="genAI()">✨ AIにキャプションを作ってもらう</button>`;}
    else{h+=`<label class="fld">投稿文（キャプション）</label><textarea id="flCap">${esc(flowCaption)}</textarea>
      <label class="fld">サムネ用メッセージ（つかみ）</label><input type="text" id="flThumb" value="${esc(flowThumb)}">
      <p class="hint">そのまま使ってもOK。気になるところは直せます。</p>`;}
    h+=flowBtns(!!flowCaption);
  }else if(flowStep===3){
    h+=`<label class="fld">③ 公開のしかた</label><div class="seg" id="whenSeg">
      <button class="${flowWhen==='即時'?'on':''}" onclick="setWhen('即時')">今すぐ公開</button>
      <button class="${flowWhen==='予約'?'on':''}" onclick="setWhen('予約')">予約して公開</button></div>`;
    if(flowWhen==="予約"){h+=`<div class="sub"><label class="fld">いつ公開する？</label><input type="datetime-local" id="flWhen" value="${flowSchedAt}"></div>`;}
    h+=`<p class="hint">※実際の公開には Meta社の連携・審査が必要です（試作では一覧に記録されます）。連続投稿はスパム判定を避けるため間隔をあけます。</p>`;
    h+=flowBtns(true);
  }else{
    const set=DB.settings[curStore];
    h+=`<div class="ai-summary"><div class="lab">確認</div>
      <b>${esc(s.title)}</b><br>サムネ：「${esc(flowThumb)}」<br>公開：${flowWhen==="予約"?("予約 "+(flowSchedAt?flowSchedAt.replace("T"," "):"")):"今すぐ"}<br>
      承認：${set.approval?"本部の承認後に公開されます":"そのまま公開されます"}</div>`;
    h+=`<button class="btn-grad" onclick="submitPost()">${set.approval?"本部に申請する":"公開する"}</button>`;
    h+=`<button class="btn-line" onclick="flowStep=3;renderFlow()">← 戻る</button>`;
  }
  document.getElementById("genBody").innerHTML=h;
}
function flowBtns(canNext){return `<div class="m-actions">
  <button class="btn-ghost" onclick="${flowStep===1?"closeModal('genModal')":"flowBack()"}">${flowStep===1?"やめる":"戻る"}</button>
  <button class="btn-main" style="opacity:${canNext?1:.5}" onclick="${canNext?"flowNext()":""}">次へ</button></div>`;}
function pickVideo(){flowHasVideo=true;renderFlow();}
function genAI(){flowCaption=genCaption(SCRIPTS[flowScriptIdx]);renderFlow();}
function setWhen(w){flowWhen=w;if(w==="予約"&&!flowSchedAt){const d=new Date();d.setDate(d.getDate()+1);d.setHours(11,0,0,0);flowSchedAt=fmt(d)+"T11:00";}renderFlow();}
function flowNext(){
  if(flowStep===2){const c=document.getElementById("flCap"),t=document.getElementById("flThumb");if(c)flowCaption=c.value;if(t)flowThumb=t.value;}
  if(flowStep===3&&flowWhen==="予約"){const w=document.getElementById("flWhen");if(w)flowSchedAt=w.value;}
  flowStep++;renderFlow();
}
function flowBack(){if(flowStep===2){const c=document.getElementById("flCap"),t=document.getElementById("flThumb");if(c)flowCaption=c.value;if(t)flowThumb=t.value;}flowStep--;renderFlow();}
function submitPost(){
  const set=DB.settings[curStore];const s=SCRIPTS[flowScriptIdx];
  let status=set.approval?"pending":(flowWhen==="予約"?"scheduled":"posted");
  let when=flowWhen==="予約"?("予約："+(flowSchedAt?flowSchedAt.replace("T"," "):"")):(status==="posted"?"今すぐ投稿":"公開予定");
  if(set.approval)when=flowWhen==="予約"?("予約："+(flowSchedAt?flowSchedAt.replace("T"," "):"")):"承認後すぐ公開";
  DB.posts[curStore].unshift({id:"p"+Date.now(),store:curStore,status,scriptTitle:s.title,caption:flowCaption||genCaption(s),thumbText:flowThumb,when,at:todayStr()});
  DB.settings[curStore].lastScript=(flowScriptIdx+1)%SCRIPTS.length; // 次は別の台本
  save();closeModal("genModal");
  alert(set.approval?"本部に申請しました。承認されると公開されます。":(flowWhen==="予約"?"予約しました。":"公開しました（試作では一覧に記録）。"));
  render();
}

function renderSurvey(){ return role==="hq"?renderSurveyHQ():renderSurveyRespondent(); }
function activeSurvey(){return DB.surveys.find(s=>s.status==="active")||DB.surveys[0];}

function renderSurveyRespondent(){

    <p class="lead" style="margin:8px 0 0">${sv.status==="active"?"回答を受付中です。所要5〜7分。":"現在この調査は受付していません。"}</p></div>`;

  }

}
let ansAttrs,ansData,ansGood,ansBad,ansTotal;
function startAnswer(){
  const sv=activeSurvey();ansAttrs={gender:"",age:"",tenure:"",role:"",dept:""};ansData={};ansGood="";ansBad="";ansTotal=0;
  renderAnswer();openModal("genModal");
}
function renderAnswer(){
  const sv=activeSurvey();const qs=allQ();
  let h=`<h2>${esc(sv.title)}</h2><p class="hint">4段階でお答えください。最後に総合満足度と自由記述があります。</p>`;
  // 属性
  h+=`<div class="sec-h" style="margin-top:14px"><span class="dot"></span>あなたについて</div>`;
  h+=attrSelect("性別",["男性","女性"],"gender");
  h+=attrSelect("年齢",AGES,"age");
  h+=attrSelect("勤続年数",TENURES,"tenure");
  h+=attrSelect("役職",sv.attr.roles,"role");
  h+=attrSelect("所属",sv.attr.depts,"dept");
  // 設問
  ["A","B"].forEach(g=>{
    h+=`<div class="sec-h"><span class="dot"></span>${ES_TEMPLATE[g].name}</div>`;
    ES_TEMPLATE[g].subs.forEach(sub=>{
      h+=`<div class="card"><div class="grp-title">${sub.name}</div>`;
      sub.qs.forEach((q,i)=>{const id=sub.key+"_"+i;const v=ansData[id];
        h+=`<div class="q-block"><div class="q-text">${esc(q)}</div><div class="q-opts">
          ${[["1","まさにそう思う"],["2","どちらかというとそう思う"],["3","どちらかというとそう思わない"],["4","まったくそう思わない"]].map(o=>
            `<button class="${v==o[0]?'on':''}" onclick="setAns('${id}','${o[0]}')">${o[1]}</button>`).join("")}</div></div>`;});
      h+=`</div>`;
    });
  });
  // 総合
  h+=`<div class="sec-h"><span class="dot"></span>総合満足度</div><div class="card"><div class="q-block">
    <div class="q-text">総合的にみて、この会社で働けていることに満足している</div><div class="q-opts">
    ${[["1","まさにそう思う"],["2","どちらかというとそう思う"],["3","どちらかというとそう思わない"],["4","まったくそう思わない"]].map(o=>
      `<button class="${ansTotal==o[0]?'on':''}" onclick="setTotal('${o[0]}')">${o[1]}</button>`).join("")}</div></div></div>`;
  // 自由記述
  h+=`<div class="sec-h"><span class="dot"></span>自由記述（任意）</div><div class="card">
    <label class="fld">困っていること・改善してほしいこと</label><textarea id="svBad">${esc(ansBad)}</textarea>
    <label class="fld">最近うれしかったこと・良かったこと</label><textarea id="svGood">${esc(ansGood)}</textarea></div>`;
  h+=`<div class="m-actions"><button class="btn-ghost" onclick="closeModal('genModal')">やめる</button>
    <button class="btn-main" onclick="submitAnswer()">回答を送る</button></div>`;
  document.getElementById("genBody").innerHTML=h;
}
function attrSelect(label,opts,key){
  return `<label class="fld">${label}</label><div class="seg">${opts.map(o=>
    `<button class="${ansAttrs[key]===o?'on':''}" onclick="setAttr('${key}','${esc(o)}')">${esc(o)}</button>`).join("")}</div>`;
}
function setAttr(k,v){ansAttrs[k]=v;syncFree();renderAnswer();}
function setAns(id,v){ansData[id]=v;syncFree();renderAnswer();}
function setTotal(v){ansTotal=v;syncFree();renderAnswer();}
function syncFree(){const b=document.getElementById("svBad"),g=document.getElementById("svGood");if(b)ansBad=b.value;if(g)ansGood=g.value;}
function submitAnswer(){
  syncFree();const sv=activeSurvey();const qs=allQ();
  const answered=qs.filter(q=>ansData[q.id]).length;
  if(answered<qs.length||!ansTotal){if(!confirm("未回答の設問があります。このまま送りますか？"))return;}
  const answers={};qs.forEach(q=>{if(ansData[q.id])answers[q.id]=Number(ansData[q.id]);});
  sv.responses.push({attrs:{...ansAttrs},answers,total:Number(ansTotal)||0,freeGood:ansGood,freeBad:ansBad});

function surveySettingsBtn(){return `<button class="btn-line no-print" onclick="openSurveySettings()">⚙ 役職・所属の設定／受付の開始・停止</button>`;}
// 小分類スコア（上位2つの割合の平均）
function subScores(sv){
  const out=[];["A","B"].forEach(g=>ES_TEMPLATE[g].subs.forEach(sub=>{
    const ss=sub.qs.map((q,i)=>qScore(sv,sub.key+"_"+i)).filter(v=>v!==null);
    out.push({name:sub.name,grp:ES_TEMPLATE[g].name,score:ss.length?Math.round(ss.reduce((a,b)=>a+b,0)/ss.length):0});
  }));return out;
}
function qScore(sv,id){const a=sv.responses.map(r=>r.answers[id]).filter(v=>v);if(!a.length)return null;return Math.round(a.filter(v=>v<=2).length/a.length*100);}
// 全設問の平均スコア（属性フィルタ可）
function overallScore(responses){const qs=allQ();let sum=0,c=0;qs.forEach(q=>{const a=responses.map(r=>r.answers[q.id]).filter(v=>v);if(a.length){sum+=a.filter(v=>v<=2).length/a.length*100;c++;}});return c?Math.round(sum/c):0;}
function attrTable(sv,key){
  const groups=key==="dept"?sv.attr.depts:sv.attr.roles;
  const all=overallScore(sv.responses);
  let h=`<table class="attr"><tr><th class="name" style="text-align:left">${key==="dept"?"所属":"役職"}</th><th>回答数</th><th>満足度</th></tr>`;
  groups.forEach(g=>{const rs=sv.responses.filter(r=>r.attrs[key]===g);if(!rs.length){h+=`<tr><td class="name">${esc(g)}</td><td>0</td><td class="muted">—</td></tr>`;return;}
    const sc=overallScore(rs);const cls=sc-all>=10?"cell-hi":sc-all<=-10?"cell-lo":"";
    h+=`<tr><td class="name">${esc(g)}</td><td>${rs.length}</td><td class="${cls}">${sc}%</td></tr>`;});
  h+=`<tr><td class="name"><b>全体</b></td><td>${sv.responses.length}</td><td><b>${all}%</b></td></tr></table>`;
  return h;
}
function aiSummary(sv,totalScore){
  const subs=subScores(sv).slice().sort((a,b)=>b.score-a.score);
  const hi=subs[0],lo=subs[subs.length-1];
  const depts=sv.attr.depts.map(d=>({d,rs:sv.responses.filter(r=>r.attrs.dept===d)})).filter(x=>x.rs.length).map(x=>({d:x.d,sc:overallScore(x.rs)})).sort((a,b)=>b.sc-a.sc);
  const dHi=depts[0],dLo=depts[depts.length-1];
  let s=`総合満足度は<b>${totalScore}%</b>です。`;
  s+=`最も高い項目は「<b>${esc(hi.name)}</b>」（${hi.score}%）、最も低いのは「<b>${esc(lo.name)}</b>」（${lo.score}%）でした。`;
  if(dHi&&dLo&&dHi.d!==dLo.d) s+=`所属別では<b>${dHi.d}</b>（${dHi.sc}%）が高く、<b>${dLo.d}</b>（${dLo.sc}%）が低めです。まずは「${esc(lo.name)}」と${dLo.d}のフォローから着手するのがおすすめです。`;
  return s;
}

/* ----- AIアクション提案（次月の目標→着地見込み→差額→具体策） ----- */
let suggCache={};
function numFrom(s){return parseFloat(String(s==null?"":s).replace(/[^0-9.\-]/g,""));}
function getLatestActual(store,field){
  const fs=(DB.reports.forms[store]||[]).filter(f=>f.actuals&&f.actuals[field]!=null).sort((a,b)=>b.month.localeCompare(a.month));

// 今月の季節・学休・行事から、その時期の施策を返す（需要側の目標のみ）＋近隣メモ
function timelyTips(k){
  if(["sales","guests","unitPrice"].indexOf(k)<0)return [];
  const m=new Date().getMonth()+1;
  const out=(CAL[m]&&CAL[m].tips)?CAL[m].tips.slice():[];

  if(note)out.push({t:"近隣の予定に合わせる【地域】",d:"近隣メモ「"+note+"」に合わせ、当日の仕込み増・SNS事前告知・人員配置を前倒しで準備する。",ev:"地域：店長が入力した近隣の予定・時事",kpi:"該当日の客数・売上を前年同曜日と比較して記録"});

  const ap=(DB.reports.forms[repStore]||[]).filter(f=>f.status==="approved"&&f.reviews&&f.reviews[info.metric]).sort((a,b)=>b.month.localeCompare(a.month));
  if(info.metric&&ap.length&&ap[0].reviews[info.metric])past="📌 前回の取り組み：「"+ap[0].reviews[info.metric]+"」";
  const tips=info.tips.concat(timelyTips(k));

  let h=`<div class="ai-summary" style="margin-top:10px"><div class="lab">🤖 AIアクション提案（下書き）</div>

function recalcGap(k){
  const info=GOAL_INFO[k];
  const target=numFrom(document.getElementById("gt_"+k).value);
  const baseEl=document.getElementById("base_"+k);if(!baseEl)return;
  const base=numFrom(baseEl.value),gEl=document.getElementById("gap_"+k);
  const n=(suggCache[k]||info.tips).length;
  const effs=[];for(let i=0;i<n;i++){const e=document.getElementById("eff_"+k+"_"+i);if(e)effs.push(e);}
  if(isNaN(target)||isNaN(base)){gEl.innerHTML="次月の目標値（上の入力欄）と着地見込みを数値で入れると、差額を自動計算します。";effs.forEach(e=>e.textContent="目安：—");return;}
  const gap=target-base,absg=Math.round(Math.abs(gap)*10)/10,need=info.hi?gap>0:gap<0;
  gEl.innerHTML=`目標 <b>${target}${info.unit}</b>　/　何もしない着地 <b>${base}${info.unit}</b>　→　`+
    (need?`<b style="color:#f43f5e">あと ${absg}${info.unit} の${info.hi?"上乗せ":"改善"}が必要</b>`:`<b style="color:#2563eb">すでに目標到達（余裕 ${absg}${info.unit}）</b>`);
  const fr=[0.4,0.35,0.25,0.2,0.15,0.15];
  effs.forEach((e,i)=>{e.textContent=need?("目安効果：約 "+(Math.round(absg*(fr[i]||0.1)*10)/10)+info.unit):"目安効果：さらなる上積み";});
}
function insertPlanFromSugg(k,i){
  const info=GOAL_INFO[k],tp=suggCache[k][i],ta=document.getElementById("gp_"+k);
  const target=numFrom(document.getElementById("gt_"+k).value);
  const baseEl=document.getElementById("base_"+k),base=baseEl?numFrom(baseEl.value):NaN;
  let eff="";
  if(!isNaN(target)&&!isNaN(base)){const fr=[0.4,0.35,0.25,0.2,0.15,0.15];eff="／目標効果：約"+(Math.round(Math.abs(target-base)*(fr[i]||0.1)*10)/10)+info.unit;}
  const line="・"+tp.t+"："+tp.d+"【計測】"+tp.kpi+eff;
  ta.value=ta.value.trim()?(ta.value.replace(/\s+$/,"")+"\n"+line):line;ta.focus();
}
function recalcReport(){
  const bud=DB.reports.budgets[repStore];
  PERF.forEach(p=>{
    const el=document.getElementById("ra_"+p.k);if(!el)return;
    const a=parseFloat(el.value),b=bud[p.k].budget,prev=bud[p.k].prev;
    const rb=document.getElementById("rb_"+p.k),rp=document.getElementById("rp_"+p.k),rq=document.getElementById("rq_"+p.k);
    if(isNaN(a)){rb.textContent="予算比 —";rb.className="";rb.style.background="#f1f2fa";rp.textContent="前年比 —";rq.textContent="（当月実績を入力してください）";return;}
    const br=b?Math.round(a/b*100):0,pr=prev?Math.round(a/prev*100):0,ok=p.hi?a>=b:a<=b;
    rb.textContent="予算比 "+br+"%";rb.style.background="";rb.className=ok?"rt-good":"rt-bad";
    rp.textContent="前年比 "+pr+"%";
    rq.textContent=ok?"達成！　どのようなアクションで成果をあげましたか？":"未達。　どのようなアクションを実践していれば成果をあげられましたか？";
  });
}
function saveReport(submit){
  const f=getForm(repStore,repId);
  PERF.forEach(p=>{const v=document.getElementById("ra_"+p.k).value;f.actuals[p.k]=v===""?null:parseFloat(v);});
  PERF.forEach(p=>f.reviews[p.k]=document.getElementById("rv_"+p.k).value);
  f.chance=document.getElementById("rep_chance").value;f.threat=document.getElementById("rep_threat").value;
  GOALS.forEach(g=>f.goals[g.k]={target:document.getElementById("gt_"+g.k).value,plan:document.getElementById("gp_"+g.k).value});
  if(submit){
    if(!PERF.some(p=>f.actuals[p.k]!=null)){alert("当月実績を入力してください。");return;}
    f.status="submitted";f.submittedAt=todayStr();f.rejectComment="";
  }else if(f.status==="rejected")f.status="draft";
  save();closeModal("genModal");
  alert(submit?"本部へ提出しました。承認をお待ちください。":"下書きを保存しました。");render();
}
function viewReport(store,id){repViewStore=store;repViewId=id;module="report";render();}
function backReport(){repViewId=null;render();}
function renderReportView(){
  const store=repViewStore,f=getForm(store,repViewId),bud=DB.reports.budgets[store];
  let html=printHead(monthLabelOf(f.month)+"の月次レポート（"+store+"）");
  html+=`<div class="no-print" style="display:flex;gap:10px;margin-bottom:10px">
    <button class="btn-line" style="margin:0" onclick="backReport()">← 戻る</button>
    ${f.status==="approved"?`<button class="btn-grad" style="margin:0" onclick="window.print()">📄 PDFで保存・印刷</button>`:""}</div>`;
  html+=`<div class="card"><div class="t-meta" style="margin-bottom:6px"><span class="pill ${REP_CLASS[f.status]}">${REP_LABEL[f.status]}</span></div>`;
  if(f.status==="rejected"&&f.rejectComment)html+=`<div class="scope-note" style="color:var(--red);border-color:var(--red-bg)">本部より差し戻し：${esc(f.rejectComment)}</div>`;
  // ① 業績
  html+=`<div class="sec-h"><span class="dot"></span>① 業績の確認</div>`;
  PERF.forEach(p=>{const a=f.actuals[p.k];if(a==null){html+=`<div class="sub-score"><div class="ss-name">${p.name}</div><div class="muted">未入力</div></div>`;return;}
    const b=bud[p.k].budget,prev=bud[p.k].prev,br=b?Math.round(a/b*100):0,pr=prev?Math.round(a/prev*100):0,ok=p.hi?a>=b:a<=b;
    html+=`<div class="sub-score"><div class="ss-name">${p.name}<div class="t-meta">実績 ${a}${p.unit}／予算 ${b}／前年 ${prev}　・　前年比${pr}%</div></div>
      <div style="flex:0 0 auto;padding:6px 10px;border-radius:10px;font-weight:800" class="${ok?'rt-good':'rt-bad'}">予算比${br}%</div></div>`;});
  html+=`</div>`;
  // ② 振り返り
  html+=`<div class="sec-h"><span class="dot"></span>② アクションの振り返り</div><div class="card">`;
  PERF.forEach(p=>{const a=f.actuals[p.k];const ok=a!=null&&(p.hi?a>=bud[p.k].budget:a<=bud[p.k].budget);
    html+=`<div class="q-block"><div class="t-name">${p.name}　<span class="pill ${ok?'rt-good':'rt-bad'}">${a==null?"未入力":ok?"達成":"未達"}</span></div>
      <div class="freetext" style="border:none;padding-top:6px">${esc(f.reviews[p.k]||"（記入なし）")}</div></div>`;});
  html+=`</div>`;
  // ③④
  html+=`<div class="sec-h"><span class="dot"></span>③ 次月のチャンス</div><div class="card"><div class="freetext" style="border:none">${esc(f.chance||"（記入なし）")}</div></div>`;
  html+=`<div class="sec-h"><span class="dot"></span>④ 次月の脅威</div><div class="card"><div class="freetext" style="border:none">${esc(f.threat||"（記入なし）")}</div></div>`;
  // ⑤
  html+=`<div class="sec-h"><span class="dot"></span>⑤ 次月の目標・アクションプランと進捗</div><div class="card">`;
  GOALS.forEach(g=>{html+=renderGoalProgress(f,g);});
  html+=`</div>`;
  return html;
}
// ⑤の目標ごとに：プラン＋進捗（実績記録に対する達成率）
function renderGoalProgress(f,g){
  const k=g.k,info=GOAL_INFO[k],gv=(f.goals&&f.goals[k])||{};
  const recs=(f.progress&&f.progress[k])||[];
  const tnum=numFrom(gv.target);
  let statusHtml,barHtml="";
  if(recs.length&&!isNaN(tnum)&&tnum!==0){
    const latest=recs[recs.length-1].value;
    let pc=info.hi?latest/tnum:tnum/latest;if(!isFinite(pc)||pc<0)pc=0;
    const bar=Math.max(0,Math.min(100,Math.round(pc*100)));
    const st=bar>=100?["達成","#2563eb"]:bar>=80?["順調","#10b981"]:["遅れ","#f43f5e"];
    statusHtml=`<span class="pill" style="background:#eef0fb;color:${st[1]}">${st[0]} ${bar}%</span> <span class="muted" style="font-size:12px">最新 ${latest}${info.unit} / 目標 ${tnum}${info.unit}</span>`;
    barHtml=`<div class="bar" style="margin:6px 0"><i style="width:${bar}%"></i></div>`;
  }else{
    statusHtml=`<span class="muted" style="font-size:12px">まだ記録がありません（下のボタンから実績を記録）</span>`;
  }
  const recList=recs.length?`<div style="margin-top:4px">`+recs.map(r=>`<div class="t-meta">・${r.date.slice(5)}　<b>${r.value}${info.unit}</b>${r.note?"（"+esc(r.note)+"）":""}</div>`).join("")+`</div>`:"";
  return `<div class="q-block"><div class="t-name">${g.name}：${esc(gv.target||"—")}</div>
    <div class="freetext" style="border:none;padding-top:4px;white-space:pre-wrap">${esc(gv.plan||"（記入なし）")}</div>
    <div style="margin-top:8px;font-size:13px;font-weight:700">📊 進捗：${statusHtml}</div>${barHtml}${recList}
    <button class="btn-line no-print" style="margin-top:8px;width:auto;padding:8px 12px;font-size:13px" onclick="logProgress('${k}')">＋ 実績を記録</button></div>`;
}
function logProgress(k){
  const g=GOALS.find(x=>x.k===k),info=GOAL_INFO[k];
  document.getElementById("genBody").innerHTML=`<h2>${g.name}の実績を記録</h2>
    <p class="hint">計測した数値を記録すると、目標に対する進捗（％・バー）が出ます。週1回など定期的に記録すると結果が見える化されます。</p>
    <label class="fld">計測値（${info.unit}）</label><input type="number" inputmode="decimal" id="pgVal">
    <label class="fld">メモ（任意）</label><input type="text" id="pgNote" placeholder="例：限定28食完売・晴れ">
    <div class="m-actions"><button class="btn-ghost" onclick="closeModal('genModal')">やめる</button>
    <button class="btn-main" onclick="saveProgress('${k}')">記録する</button></div>`;
  openModal("genModal");
}
function saveProgress(k){
  const v=numFrom(document.getElementById("pgVal").value);
  if(isNaN(v)){alert("計測値を数値で入れてください。");return;}
  const note=document.getElementById("pgNote").value;
  const f=getForm(repViewStore,repViewId);
  if(!f.progress)f.progress={};if(!f.progress[k])f.progress[k]=[];
  f.progress[k].push({date:todayStr(),value:v,note});
  save();closeModal("genModal");render();
}
function renderReportHQ(){
  let html=`<div class="sec-h"><span class="dot"></span>承認待ちのレポート</div><div class="card">`;
  const pend=[];STORES.forEach(s=>(DB.reports.forms[s]||[]).forEach(f=>{if(f.status==="submitted")pend.push({s,f});}));
  html+= pend.length? pend.map(({s,f})=>`<div class="task"><div class="t-body"><div class="t-name">${s}・${monthLabelOf(f.month)}のレポート</div>
    <div class="t-meta"><span class="pill st-pending">承認待ち</span></div></div>
    <div style="display:flex;flex-direction:column;gap:6px">
      <button class="ai-btn" style="background:var(--green);border:none;color:#fff;margin:0" onclick="approveReport('${s}','${f.id}')">承認</button>
      <button class="ai-btn" style="background:#fff;border:1.5px solid var(--red-bg);color:var(--red);margin:0" onclick="rejectReport('${s}','${f.id}')">否認</button>
      <button class="ai-btn" style="margin:0" onclick="viewReport('${s}','${f.id}')">内容を見る</button></div></div>`).join("") : `<div class="empty">承認待ちのレポートはありません</div>`;
  html+=`</div>`;
  html+=`<div class="sec-h"><span class="dot"></span>予算・前年実績の設定</div><div class="card">`;
  STORES.forEach(s=>{html+=`<div class="toggle"><div><div class="t-name">${s}</div><div class="t-meta">売上予算 ${DB.reports.budgets[s].sales.budget}万円 ほか</div></div>
    <button class="btn-line" style="width:auto;margin:0;padding:8px 14px;font-size:13px" onclick="openBudgetForm('${s}')">設定</button></div>`;});
  html+=`</div>`;
  html+=`<div class="sec-h"><span class="dot"></span>提出されたレポート</div><div class="card">`;
  let any=false;STORES.forEach(s=>{const fs=(DB.reports.forms[s]||[]).filter(f=>f.status!=="draft").sort((a,b)=>b.month.localeCompare(a.month));
    if(fs.length){any=true;html+=`<div class="grp-title">▪ ${s}</div>`+fs.map(f=>`<div class="task"><div class="t-body"><div class="t-name">${monthLabelOf(f.month)}のレポート</div>
      <div class="t-meta"><span class="pill ${REP_CLASS[f.status]}">${REP_LABEL[f.status]}</span></div></div>
      <button class="t-edit" onclick="viewReport('${s}','${f.id}')">表示</button></div>`).join("");}});
  if(!any)html+=`<div class="empty">まだありません</div>`;
  html+=`</div>`;
  return html;
}
function approveReport(s,id){const f=getForm(s,id);f.status="approved";f.approvedAt=todayStr();f.rejectComment="";save();alert(s+"の"+monthLabelOf(f.month)+"レポートを承認しました。");render();}
function rejectReport(s,id){const c=prompt("差し戻しのコメント（修正してほしい点など）","");if(c===null)return;const f=getForm(s,id);f.status="rejected";f.rejectComment=c||"修正をお願いします。";save();render();}
function openBudgetForm(store){
  const bud=DB.reports.budgets[store];
  let h=`<h2>${store}の予算・前年実績</h2><p class="hint">ここで設定した値をもとに、店長の入力から予算比・前年比を自動計算します。</p>`;
  PERF.forEach(p=>{h+=`<div class="card" style="margin-bottom:10px"><div class="t-name">${p.name}（${p.unit}）</div>
    <label class="fld">予算</label><input type="number" inputmode="decimal" id="bb_${p.k}" value="${bud[p.k].budget}">
    <label class="fld">前年実績</label><input type="number" inputmode="decimal" id="bp_${p.k}" value="${bud[p.k].prev}"></div>`;});
  h+=`<div class="m-actions"><button class="btn-ghost" onclick="closeModal('genModal')">やめる</button><button class="btn-main" onclick="saveBudget('${store}')">保存</button></div>`;
  document.getElementById("genBody").innerHTML=h;openModal("genModal");
}
function saveBudget(store){const bud=DB.reports.budgets[store];
  PERF.forEach(p=>{bud[p.k].budget=parseFloat(document.getElementById("bb_"+p.k).value)||0;bud[p.k].prev=parseFloat(document.getElementById("bp_"+p.k).value)||0;});
  save();closeModal("genModal");render();}

/* =====================================================================
   共通：モーダル開閉・起動
   ===================================================================== */
function openModal(id){document.getElementById(id).classList.add("on");}
function closeModal(id){document.getElementById(id).classList.remove("on");}
document.querySelectorAll("#freqSeg button").forEach(b=>b.onclick=()=>setFreq(b.dataset.f));
document.querySelectorAll("#scopeSeg button").forEach(b=>b.onclick=()=>setScope(b.dataset.s));
document.querySelectorAll("#storeChecks button").forEach(b=>b.onclick=()=>b.classList.toggle("on"));
["taskModal","genModal"].forEach(id=>document.getElementById(id).addEventListener("click",e=>{if(e.target.id===id)closeModal(id);}));

window.addEventListener("resize",sizeHeaderImages);
load();render();
</script>
