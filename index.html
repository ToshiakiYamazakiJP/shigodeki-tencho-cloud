/* ===== 日付・くりかえし ===== */
const fmt=d=>d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
const parse=s=>{const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);};
const todayStr=()=>fmt(new Date());
const daysBetween=(a,b)=>Math.round((parse(b)-parse(a))/86400000);
const wdJa=["日","月","火","水","木","金","土"];
function isoWeek(d){const x=new Date(d);x.setHours(0,0,0,0);x.setDate(x.getDate()+3-((x.getDay()+6)%7));const w1=new Date(x.getFullYear(),0,4);return x.getFullYear()+"-W"+(1+Math.round(((x-w1)/86400000-3+((w1.getDay()+6)%7))/7));}
function cycleKey(t,ref){const d=ref||new Date();switch(t.freq){case"daily":return"d"+fmt(d);case"weekly":return"w"+isoWeek(d);case"monthlyDay":case"monthlyNth":return"m"+d.getFullYear()+"-"+(d.getMonth()+1);case"once":return"once";}}
function isDone(t){return (t.completions||[]).includes(cycleKey(t));}
function monthDay(y,m,day){const last=new Date(y,m+1,0).getDate();return new Date(y,m,Math.min(day,last));}
function nthWk(y,m,nth,wd){const first=new Date(y,m,1),off=(wd-first.getDay()+7)%7;let dt=1+off+(nth-1)*7;const last=new Date(y,m+1,0).getDate();if(dt>last)dt-=7;return new Date(y,m,dt);}
function upWeekday(f,wd){const d=new Date(f);d.setDate(d.getDate()+((wd-d.getDay()+7)%7));return d;}
function nextDue(t){const now=new Date();now.setHours(0,0,0,0);const done=isDone(t);switch(t.freq){
  case"daily":if(!done)return fmt(now);{const x=new Date(now);x.setDate(x.getDate()+1);return fmt(x);}
  case"weekly":{let c=upWeekday(now,t.weekday);if(done){c=new Date(c);c.setDate(c.getDate()+7);}return fmt(c);}
  case"monthlyDay":{let c=monthDay(now.getFullYear(),now.getMonth(),t.day);if(c<now||done)c=monthDay(now.getFullYear(),now.getMonth()+1,t.day);return fmt(c);}
  case"monthlyNth":{let c=nthWk(now.getFullYear(),now.getMonth(),t.nth,t.nth_weekday);if(c<now||done)c=nthWk(now.getFullYear(),now.getMonth()+1,t.nth,t.nth_weekday);return fmt(c);}
  case"once":return t.once_date;}}
function dueState(t){if(isDone(t))return"done";const due=nextDue(t);if(!due)return"ok";const diff=daysBetween(todayStr(),due);if(diff<0)return"over";if(diff<=3)return"soon";return"ok";}
function freqText(t){switch(t.freq){case"daily":return"毎日";case"weekly":return"毎週"+wdJa[t.weekday]+"曜";case"monthlyDay":return"毎月"+t.day+"日";case"monthlyNth":return"毎月第"+t.nth+wdJa[t.nth_weekday]+"曜";case"once":return"単発";}}
function dueText(t){if(isDone(t))return"完了ずみ";const due=nextDue(t);if(!due)return"";const diff=daysBetween(todayStr(),due),[y,m,d]=due.split("-"),md=Number(m)+"/"+Number(d);
  if(diff<0)return md+"（"+(-diff)+"日 過ぎています）";if(diff===0)return md+"（今日まで）";if(diff===1)return md+"（明日まで）";if(diff<=3)return md+"（あと"+diff+"日）";return md+"まで";}
function storeName(id){const s=STORES.find(x=>x.id===id);return s?s.name:"店舗";}
function achievement(storeId){const a=TASKS.filter(t=>t.store_id===storeId);const total=a.length,done=a.filter(isDone).length;return{done,total,pct:total?Math.round(done/total*100):0};}

/* ===== タスク ===== */
function renderTask(){ return view.mode==="hq"?renderTaskHQ():renderTaskStore(view.storeId); }
function renderTaskStore(sid){
  const a=achievement(sid),arr=TASKS.filter(t=>t.store_id===sid);
  const remind=arr.filter(t=>dueState(t)==="over"||dueState(t)==="soon").sort((x,y)=>daysBetween(todayStr(),nextDue(x))-daysBetween(todayStr(),nextDue(y)));
  const cats=[...new Set(arr.map(t=>t.category))];
  let h=`<div class="card"><div class="ach-top"><span class="ach-label">${esc(storeName(sid))}の達成度（今の周期）</span><span class="ach-count">${a.done} / ${a.total} 完了</span></div>
    <div class="ach-pct">${a.pct}<span>%</span></div><div class="bar"><i style="width:${a.pct}%"></i></div></div>`;
  h+=`<div class="sec-h"><span class="dot"></span>リマインド（期限が近い・過ぎたタスク）</div>`;
  h+= remind.length? `<div class="card">`+remind.map(taskRow).join("")+`</div>` : `<div class="card"><div class="empty">期限が迫ったタスクはありません 👍</div></div>`;
  h+=`<div class="sec-h"><span class="dot"></span>すべてのタスク（分野ごと）</div><div class="card">`;
  cats.forEach(c=>{h+=`<div class="grp-title">▪ ${esc(c)}</div>`+arr.filter(t=>t.category===c).map(taskRow).join("");});
  h+=`</div><button class="btn-grad" onclick="openTaskForm()">＋ タスクを追加</button>`;
  return h;
}
function taskRow(t){
  const done=isDone(t),st=dueState(t);let pc="due-ok",pill=dueText(t);
  if(done){pc="done-tag";pill="✓ 完了ずみ";}else if(st==="over")pc="due-over";else if(st==="soon")pc="due-soon";
  const canEdit = ME.role==="hq" ? false : (t.scope==="single"); // 店長は自店の単店タスクのみ編集
  return `<div class="task ${done?'done':''}"><button class="check ${done?'done':''}" onclick="toggleDone('${t.id}')">✓</button>
    <div class="t-body"><div class="t-name">${esc(t.name)}</div><div class="t-meta">
      <span class="pill">${freqText(t)}</span><span class="pill ${pc}">${pill}</span>${t.scope==="all"?'<span class="pill scope-all">全店共通</span>':''}</div></div>
    ${canEdit?`<button class="t-edit" onclick="openTaskForm('${t.id}')">✎</button>`:''}</div>`;
}
function renderTaskHQ(){
  const data=STORES.map(s=>({s,...achievement(s.id)}));const max=Math.max(...data.map(d=>d.pct)),min=Math.min(...data.map(d=>d.pct));
  let h=`<div class="card"><div class="ach-label">本部ダッシュボード｜各店の達成度くらべ</div>`;
  data.forEach(d=>{let tag="";if(d.pct===max&&d.pct!==min)tag=`<span class="pill done-tag">トップ</span>`;else if(d.pct===min&&d.pct!==max)tag=`<span class="pill due-over">要フォロー</span>`;
    h+=`<div class="store-row"><div class="sr-name">${esc(d.s.name)}</div><div class="sr-bar"><div class="bar"><i style="width:${d.pct}%"></i></div><div class="t-meta" style="margin-top:4px">${d.done}/${d.total} 完了 ${tag}</div></div><div class="sr-pct">${d.pct}%</div></div>`;});
  h+=`</div>`;
  const common=TASKS.filter(t=>t.scope==="all"&&t.store_id===STORES[0]?.id);
  h+=`<div class="sec-h"><span class="dot"></span>本部からタスクを配る・管理する</div><div class="card">`;
  h+=`<div class="grp-title">▪ 全店共通のタスク（${common.length}件）</div>`;
  h+= common.length? common.map(t=>hqTaskRow(t,"全店共通","scope-all")).join("") : `<div class="empty">まだありません</div>`;
  STORES.forEach(s=>{const sg=TASKS.filter(t=>t.scope==="single"&&t.store_id===s.id);if(sg.length){h+=`<div class="grp-title">▪ ${esc(s.name)} だけのタスク（${sg.length}件）</div>`+sg.map(t=>hqTaskRow(t,s.name,"scope-single")).join("");}});
  h+=`</div><button class="btn-grad" onclick="openTaskForm()">＋ タスクを配る</button>`;

}
function hqTaskRow(t,badge,bc){
  return `<div class="task"><div class="t-body"><div class="t-name">${esc(t.name)}</div><div class="t-meta"><span class="pill">${esc(t.category||"")}</span><span class="pill">${freqText(t)}</span><span class="pill ${bc}">${badge}</span></div></div>

/* ===== 完了トグル（クラウド更新） ===== */
async function toggleDone(id){
  const t=TASKS.find(x=>x.id===id);if(!t)return;
  const k=cycleKey(t);const arr=(t.completions||[]).slice();const i=arr.indexOf(k);
  if(i>=0)arr.splice(i,1);else arr.push(k);
  t.completions=arr;render(); // 楽観的更新
  const {error}=await sb.from("tasks").update({completions:arr}).eq("id",id);
  if(error){alert("保存に失敗しました："+error.message);await loadData();render();}
}

/* ===== タスク追加・編集フォーム ===== */
let tEdit=null,freqType="daily",scopeType="all";
function openTaskForm(id){

    <label>タスク名</label><input type="text" id="fName" value="${tEdit?esc(tEdit.name):""}" placeholder="例：厨房清掃チェック">
    <label>頻度</label><div class="seg" id="freqSeg">
      ${[["daily","毎日"],["weekly","毎週"],["monthlyDay","毎月（日）"],["monthlyNth","毎月（第N曜）"],["once","単発"]].map(f=>`<button data-f="${f[0]}" class="${freqType===f[0]?'on':''}" onclick="setFreq('${f[0]}')">${f[1]}</button>`).join("")}</div>
    <div class="sub" id="subWeekly" style="display:none"><label>何曜日</label><select id="fWeekday">${wdJa.map((w,i)=>`<option value="${i}" ${tEdit&&tEdit.weekday===i?"selected":""}>毎週${w}曜</option>`).join("")}</select></div>
    <div class="sub" id="subMonthlyDay" style="display:none"><label>毎月 何日</label><select id="fDay">${Array.from({length:31},(_,i)=>`<option value="${i+1}" ${tEdit&&tEdit.day===i+1?"selected":""}>${i+1}日</option>`).join("")}</select></div>

      <select id="fNthW" style="flex:1">${wdJa.map((w,i)=>`<option value="${i}" ${tEdit&&tEdit.nth_weekday===i?"selected":""}>${w}曜</option>`).join("")}</select></div></div>
    <div class="sub" id="subOnce" style="display:none"><label>いつまでに</label><input type="date" id="fOnce" value="${tEdit&&tEdit.once_date?tEdit.once_date:todayStr()}"></div>

function setScope(s){scopeType=s;document.querySelectorAll("#scopeSeg button").forEach(b=>b.className=b.dataset.s===s?"on":"");$("storeChecks").style.display=s==="single"?"flex":"none";}
function setFreq(f){freqType=f;document.querySelectorAll("#freqSeg button").forEach(b=>b.className=b.dataset.f===f?"on":"");
  $("subWeekly").style.display=f==="weekly"?"block":"none";$("subMonthlyDay").style.display=f==="monthlyDay"?"block":"none";
  $("subMonthlyNth").style.display=f==="monthlyNth"?"block":"none";$("subOnce").style.display=f==="once"?"block":"none";}
function closeModal(){$("modal").classList.remove("on");}
function fields(){return{category:$("fCat").value,name:$("fName").value.trim(),freq:freqType,
  weekday:$("fWeekday")?Number($("fWeekday").value):null,day:$("fDay")?Number($("fDay").value):null,
  nth:$("fNth")?Number($("fNth").value):null,nth_weekday:$("fNthW")?Number($("fNthW").value):null,
  once_date:freqType==="once"&&$("fOnce")?$("fOnce").value:null};}
async function saveTask(){
  const f=fields();if(!f.name){alert("タスク名を入れてください");return;}
  let err=null;
  if(tEdit){
    if(tEdit.scope==="all") ({error:err}=await sb.from("tasks").update(f).eq("group_id",tEdit.group_id));
    else ({error:err}=await sb.from("tasks").update(f).eq("id",tEdit.id));
  }else if(ME.role==="hq"&&view.mode==="hq"&&scopeType==="all"){
    const gid="g"+Date.now();
    const rows=STORES.map(s=>({store_id:s.id,group_id:gid,scope:"all",...f,completions:[]}));
    ({error:err}=await sb.from("tasks").insert(rows));
  }else if(ME.role==="hq"&&view.mode==="hq"&&scopeType==="single"){
    const ids=[...document.querySelectorAll("#storeChecks button.on")].map(b=>Number(b.dataset.id));
    if(!ids.length){alert("配る店舗を選んでください");return;}
    const rows=ids.map(sid=>({store_id:sid,group_id:"g"+Date.now()+sid,scope:"single",...f,completions:[]}));
    ({error:err}=await sb.from("tasks").insert(rows));
  }else{
    const sid=view.mode==="store"?view.storeId:ME.store_id;
    ({error:err}=await sb.from("tasks").insert([{store_id:sid,group_id:"g"+Date.now(),scope:"single",...f,completions:[]}]));
  }
  if(err){alert("保存に失敗しました："+err.message);return;}
  closeModal();await loadData();render();
}
async function deleteTask(){
  if(tEdit.scope==="all"){if(!confirm("【全店共通】です。全店から削除します。よろしいですか？"))return;await sb.from("tasks").delete().eq("group_id",tEdit.group_id);}
  else{if(!confirm("このタスクを削除します。よろしいですか？"))return;await sb.from("tasks").delete().eq("id",tEdit.id);}
  closeModal();await loadData();render();
}

function renderInstaStore(sid){

function renderInstaHQ(){

async function nextScript(sid){

      <button class="btn-grad" onclick="submitPost()">${set.approval?"本部に申請する":"公開する"}</button><button class="btn-line" onclick="flowStep=3;renderFlow()">← 戻る</button>`;
  }

}
function flowBtns(canNext){return `<div class="m-actions"><button class="btn-ghost" onclick="${flowStep===1?"closeModal()":"flowBack()"}">${flowStep===1?"やめる":"戻る"}</button><button class="btn-grad" style="opacity:${canNext?1:.5}" onclick="${canNext?"flowNext()":""}">次へ</button></div>`;}
function pickVideo(){flowHasVideo=true;renderFlow();}
function genAI(){flowCaption=genCaption(SCRIPTS[flowScriptIdx]);renderFlow();}

function flowNext(){if(flowStep===2){const c=$("flCap"),t=$("flThumb");if(c)flowCaption=c.value;if(t)flowThumb=t.value;}if(flowStep===3&&flowWhen==="予約"){const w=$("flWhen");if(w)flowSchedAt=w.value;}flowStep++;renderFlow();}
function flowBack(){if(flowStep===2){const c=$("flCap"),t=$("flThumb");if(c)flowCaption=c.value;if(t)flowThumb=t.value;}flowStep--;renderFlow();}
async function submitPost(){

function qScore(id){const a=RESPONSES.map(r=>r.answers[id]).filter(v=>v);if(!a.length)return null;return Math.round(a.filter(v=>v<=2).length/a.length*100);}
function subScores(){const out=[];["A","B"].forEach(g=>ES_TEMPLATE[g].subs.forEach(sub=>{const ss=sub.qs.map((q,i)=>qScore(sub.key+"_"+i)).filter(v=>v!==null);out.push({name:sub.name,grp:ES_TEMPLATE[g].name,score:ss.length?Math.round(ss.reduce((a,b)=>a+b,0)/ss.length):0});}));return out;}
function overallScore(rs){const qs=allQ();let sum=0,c=0;qs.forEach(q=>{const a=rs.map(r=>r.answers[q.id]).filter(v=>v);if(a.length){sum+=a.filter(v=>v<=2).length/a.length*100;c++;}});return c?Math.round(sum/c):0;}

  let h=`<table class="attr"><tr><th class="name" style="text-align:left">${key==="dept"?"所属":"役職"}</th><th>回答数</th><th>満足度</th></tr>`;

function aiSummary(totalScore){const subs=subScores().slice().sort((a,b)=>b.score-a.score);const hi=subs[0],lo=subs[subs.length-1];
  const depts=SURVEY.attr.depts.map(d=>({d,rs:RESPONSES.filter(r=>r.attrs.dept===d)})).filter(x=>x.rs.length).map(x=>({d:x.d,sc:overallScore(x.rs)})).sort((a,b)=>b.sc-a.sc);

  if(dHi&&dLo&&dHi.d!==dLo.d)s+=`所属別では<b>${esc(dHi.d)}</b>（${dHi.sc}%）が高く、<b>${esc(dLo.d)}</b>（${dLo.sc}%）が低めです。まずは「${esc(lo.name)}」と${esc(dLo.d)}のフォローから着手するのがおすすめです。`;

function openBudgetForm(sid){
  const bud=getBudget(sid);
  let h=`<h2>${esc(storeName(sid))}の予算・前年実績／近隣メモ</h2><p class="hint">予算をもとに店長の入力から予算比・前年比を自動計算します。</p>`;
  PERF.forEach(p=>{h+=`<div class="card" style="margin-bottom:10px"><div class="t-name">${p.name}（${p.unit}）</div><label>予算</label><input type="number" inputmode="decimal" id="bb_${p.k}" value="${bud[p.k].budget}"><label>前年実績</label><input type="number" inputmode="decimal" id="bp_${p.k}" value="${bud[p.k].prev}"></div>`;});
  h+=`<label>近隣の予定・時事メモ（AI提案で使用）</label><textarea id="bln" placeholder="例：7/20 近くの大学で学園祭／毎週土曜は商店街マルシェ">${esc(LOCALNOTES[sid]||"")}</textarea>`;
  h+=`<div class="m-actions"><button class="btn-ghost" onclick="closeModal()">やめる</button><button class="btn-grad" onclick="saveBudget(${sid})">保存</button></div>`;
  $("modalBody").innerHTML=h;$("modal").classList.add("on");
}
async function saveBudget(sid){
  const b={};PERF.forEach(p=>{b[p.k]={budget:parseFloat($("bb_"+p.k).value)||0,prev:parseFloat($("bp_"+p.k).value)||0};});
  const note=$("bln").value;
  await sb.from("budgets").upsert({store_id:sid,b},{onConflict:"store_id"});
  await sb.from("local_notes").upsert({store_id:sid,note},{onConflict:"store_id"});
  closeModal();await loadData();render();
}

$("modal").addEventListener("click",e=>{if(e.target.id==="modal")closeModal();});

boot();
</script>
</body>
</html>
